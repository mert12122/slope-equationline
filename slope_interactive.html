  :root {
    --navy: #24314B;
    --coral: #E4572E;
    --teal: #3AAFA9;
    --gold: #F3A712;
    --cream: #FFFBF3;
    --grid: #e3ddd0;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 1600px;
    height: 900px;
    overflow: hidden;
  }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--cream);
    color: var(--navy);
  }
  .wrap {
    width: 1600px;
    height: 900px;
    margin: 0 auto;
    padding: 20px 44px;
    display: flex;
    flex-direction: column;
  }
  h1 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 25px;
    text-align: center;
    margin: 0 0 2px 0;
  }
  .sub {
    text-align: center;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 12px;
    color: var(--teal);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }
  .layout {
    display: flex;
    gap: 28px;
    align-items: stretch;
    flex: 1;
    min-height: 0;
  }
  .graph-panel {
    background: white;
    border-radius: 14px;
    border: 1px solid #e4ddce;
    padding: 14px;
    flex: 0 0 540px;
    width: 540px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .side-panel {
    flex: 1;
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  .points-form {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    background: white;
    border: 1px solid #e4ddce;
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 10px;
    font-size: 13px;
    flex: 0 0 auto;
  }
  .points-form .grp { display: flex; align-items: center; gap: 4px; }
  .points-form input[type=number] {
    width: 52px;
    padding: 5px 6px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
  }
  .points-form button, .step-btn, .check-btn, .reset-btn {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    cursor: pointer;
    border: none;
    border-radius: 8px;
  }
  .points-form button {
    background: var(--navy);
    color: white;
    padding: 8px 16px;
    font-size: 14px;
  }
  .steps-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 10px;
    flex: 0 0 auto;
  }
  .step-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    text-align: center;
    color: white;
    font-size: 12.5px;
    line-height: 1.15;
    padding: 9px 5px;
    border-radius: 10px;
    opacity: 0.45;
    box-shadow: none;
    transition: opacity 0.2s, transform 0.1s, box-shadow 0.15s;
  }
  .step-btn.enabled { opacity: 1; cursor: pointer; }
  .step-btn:not(.enabled) { cursor: default; }
  .step-btn.active { box-shadow: 0 0 0 3px rgba(36,49,75,0.32) inset; }
  .step-btn:active.enabled { transform: scale(0.98); }
  .step-btn .n {
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; flex-shrink: 0;
    font-size: 12px;
  }
  .step1 { background: var(--coral); }
  .step2 { background: var(--teal); }
  .step3 { background: var(--navy); }
  .step4 { background: var(--gold); color: var(--navy); }
  .step4 .n { background: rgba(36,49,75,0.18); }

  .reveal-box {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    background: white;
    border: 1px solid #e4ddce;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 10px;
    font-size: 14px;
    line-height: 1.5;
  }
  .reveal-box:empty::before {
    content: 'Click a step above to reveal the work.';
    color: #a49d8c;
    font-style: italic;
    font-size: 13px;
  }
  .reveal-box .line { margin: 2px 0; }
  .reveal-box b.final { font-size: 17px; }
  .reveal-box .genform {
    font-style: italic;
    color: var(--teal);
    font-size: 12.5px;
    margin: 0 0 6px 0;
    padding-bottom: 6px;
    border-bottom: 1px dashed #ddd6c4;
  }
  .reveal-box .genform.spaced { margin-top: 8px; }

  .quiz {
    background: white;
    border: 2px dashed var(--gold);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    flex: 0 0 auto;
  }
  .quiz input[type=text] {
    padding: 5px 8px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 13px;
    width: 150px;
  }
  .quiz-feedback { margin-top: 6px; font-weight: 600; min-height: 18px; font-size: 13px; }
  .quiz-feedback.correct { color: #1f8a4c; }
  .quiz-feedback.incorrect { color: var(--coral); }

  .reset-row { text-align: center; margin-top: 8px; flex: 0 0 auto; }
  .reset-btn {
    background: none;
    border: 1.5px solid var(--navy);
    color: var(--navy);
    padding: 6px 16px;
    font-size: 13px;
  }

  svg text { font-family: 'Segoe UI', system-ui, sans-serif; }
  .pt-label { font-weight: 700; fill: var(--navy); font-size: 16px; }
  .axis-label { fill: var(--navy); font-size: 13px; }
  .run-seg { stroke: var(--coral); stroke-width: 3.5; stroke-dasharray: 8 6; opacity: 0; transition: opacity 0.3s; }
  .rise-seg { stroke: var(--teal); stroke-width: 3.5; stroke-dasharray: 8 6; opacity: 0; transition: opacity 0.3s; }
  .run-seg.shown, .rise-seg.shown { opacity: 1; }
  .run-label, .rise-label { font-weight: 700; font-size: 14px; opacity: 0; transition: opacity 0.3s; }
  .run-label { fill: var(--coral); }
  .rise-label { fill: var(--teal); }
  .run-label.shown, .rise-label.shown { opacity: 1; }
  .full-line { stroke: var(--navy); stroke-width: 2.5; opacity: 0; transition: opacity 0.4s; }
  .full-line.shown { opacity: 1; }
  .eq-badge { opacity: 0; transition: opacity 0.4s; }
  .eq-badge.shown { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Find the Slope &amp; Equation</h1>
  <div class="sub">Click each step to reveal the work</div>

  <div class="points-form">
    <div class="grp">Point 1: (<input type="number" id="x1" value="2"> , <input type="number" id="y1" value="3">)</div>
    <div class="grp">Point 2: (<input type="number" id="x2" value="5"> , <input type="number" id="y2" value="9">)</div>
    <button id="plotBtn">Plot It</button>
  </div>

  <div class="layout">
    <div class="graph-panel">
      <svg id="svg" viewBox="0 0 640 640" style="width:100%;height:auto;display:block;"></svg>
    </div>

    <div class="side-panel">
      <div class="steps-row">
        <button class="step-btn step1 enabled" data-step="1">
          <span class="n">1</span> Rise &amp; Run
        </button>
        <button class="step-btn step2" data-step="2">
          <span class="n">2</span> Slope
        </button>
        <button class="step-btn step3" data-step="3">
          <span class="n">3</span> Equation
        </button>
        <button class="step-btn step4" data-step="4">
          <span class="n">&check;</span> Check
        </button>
      </div>

      <div class="reveal-box" id="revealBox"></div>

      <div class="quiz">
        <div><b>Quick check:</b> type the equation in slope-intercept form (e.g. <code>y = 2x - 1</code>) and press Enter.</div>
        <div style="margin-top:6px;"><input type="text" id="quizInput" placeholder="y = ..."> <button id="quizBtn" style="display:inline-block;width:auto;margin:0;padding:7px 14px;font-size:13px;font-family:'Fredoka',sans-serif;font-weight:600;cursor:pointer;border:none;border-radius:8px;background:var(--gold);color:var(--navy);">Check</button></div>
        <div class="quiz-feedback" id="quizFeedback"></div>
      </div>

      <div class="reset-row"><button class="reset-btn" id="resetBtn">Reset Steps</button></div>
    </div>
  </div>
</div>

<script>
// ---------- fraction helpers ----------
function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a || 1; }
function frac(num, den) {
  if (den < 0) { num = -num; den = -den; }
  const g = gcd(num, den);
  return { num: num / g, den: den / g };
}
function fracMul(a, b) { return frac(a.num * b.num, a.den * b.den); }
function fracSub(a, b) { return frac(a.num * b.den - b.num * a.den, a.den * b.den); }
function fracStr(f) { return f.den === 1 ? `${f.num}` : `${f.num}/${f.den}`; }
function fracNum(f) { return f.num / f.den; }

function computeLine(x1, y1, x2, y2) {
  if (x2 === x1) {
    return { vertical: true, x1, eqStr: `x = ${x1}` };
  }
  const dx = x2 - x1, dy = y2 - y1;
  const m = frac(dy, dx);
  if (m.num === 0) {
    return { horizontal: true, y1, eqStr: `y = ${y1}`, m, run: dx, rise: dy };
  }
  const b = fracSub(frac(y1, 1), fracMul(m, frac(x1, 1)));
  let mCoef;
  if (m.num === m.den) mCoef = '';
  else if (m.num === -m.den) mCoef = '-';
  else mCoef = fracStr(m);
  let eqStr;
  if (b.num === 0) eqStr = `y = ${mCoef}x`;
  else if (fracNum(b) > 0) eqStr = `y = ${mCoef}x + ${fracStr(b)}`;
  else eqStr = `y = ${mCoef}x - ${fracStr(frac(-b.num, b.den))}`;
  return { m, b, eqStr, run: dx, rise: dy, mCoef };
}

// ---------- normalize equation strings for the quiz check ----------
function normalizeEq(s) {
  return s.toLowerCase().replace(/\s+/g, '').replace(/−/g, '-');
}

// ---------- SVG graph rendering ----------
const svgNS = "http://www.w3.org/2000/svg";
let current = null; // {x1,y1,x2,y2,line}

function niceStep(range) {
  const raw = range / 10;
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw / mag;
  let step;
  if (norm < 1.5) step = 1;
  else if (norm < 3.5) step = 2;
  else if (norm < 7.5) step = 5;
  else step = 10;
  return step * mag;
}

function renderGraph(x1, y1, x2, y2) {
  const svg = document.getElementById('svg');
  svg.innerHTML = '';

  let xmin = Math.min(x1, x2, 0) - 2, xmax = Math.max(x1, x2, 0) + 2;
  let ymin = Math.min(y1, y2, 0) - 2, ymax = Math.max(y1, y2, 0) + 2;
  const W = 640, H = 640, margin = 46;

  const sx = (x) => margin + (x - xmin) / (xmax - xmin) * (W - 2 * margin);
  const sy = (y) => H - margin - (y - ymin) / (ymax - ymin) * (H - 2 * margin);

  function el(tag, attrs) {
    const e = document.createElementNS(svgNS, tag);
    for (const k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }

  const stepX = niceStep(xmax - xmin);
  const stepY = niceStep(ymax - ymin);

  // gridlines
  for (let gx = Math.ceil(xmin / stepX) * stepX; gx <= xmax; gx += stepX) {
    svg.appendChild(el('line', { x1: sx(gx), y1: sy(ymin), x2: sx(gx), y2: sy(ymax), stroke: '#e3ddd0', 'stroke-width': 1 }));
    if (gx !== 0) {
      const t = el('text', { x: sx(gx), y: sy(0) + 16, class: 'axis-label', 'text-anchor': 'middle' });
      t.textContent = Math.round(gx * 100) / 100;
      svg.appendChild(t);
    }
  }
  for (let gy = Math.ceil(ymin / stepY) * stepY; gy <= ymax; gy += stepY) {
    svg.appendChild(el('line', { x1: sx(xmin), y1: sy(gy), x2: sx(xmax), y2: sy(gy), stroke: '#e3ddd0', 'stroke-width': 1 }));
    if (gy !== 0) {
      const t = el('text', { x: sx(0) - 8, y: sy(gy) + 4, class: 'axis-label', 'text-anchor': 'end' });
      t.textContent = Math.round(gy * 100) / 100;
      svg.appendChild(t);
    }
  }

  // axes with arrowheads
  const defs = el('defs', {});
  const marker = el('marker', { id: 'arrow', viewBox: '0 0 10 10', refX: 8, refY: 5, markerWidth: 8, markerHeight: 8, orient: 'auto-start-reverse' });
  marker.appendChild(el('path', { d: 'M0,0 L10,5 L0,10 Z', fill: '#24314B' }));
  defs.appendChild(marker);
  svg.appendChild(defs);

  svg.appendChild(el('line', { x1: sx(xmin), y1: sy(0), x2: sx(xmax), y2: sy(0), stroke: '#24314B', 'stroke-width': 2.5, 'marker-end': 'url(#arrow)' }));
  svg.appendChild(el('line', { x1: sx(0), y1: sy(ymin), x2: sx(0), y2: sy(ymax), stroke: '#24314B', 'stroke-width': 2.5, 'marker-end': 'url(#arrow)' }));

  const line = computeLine(x1, y1, x2, y2);

  // full extended line (hidden until Check step)
  if (!line.vertical) {
    const m = line.horizontal ? 0 : fracNum(line.m);
    let ex1 = xmin, ey1 = y1 + m * (xmin - x1);
    let ex2 = xmax, ey2 = y1 + m * (xmax - x1);
    svg.appendChild(el('line', { x1: sx(ex1), y1: sy(Math.max(ymin, Math.min(ymax, ey1))), x2: sx(ex2), y2: sy(Math.max(ymin, Math.min(ymax, ey2))), class: 'full-line', id: 'fullLine' }));
  } else {
    svg.appendChild(el('line', { x1: sx(x1), y1: sy(ymin), x2: sx(x1), y2: sy(ymax), class: 'full-line', id: 'fullLine' }));
  }

  // run / rise construction (only meaningful for non-vertical, non-horizontal)
  if (!line.vertical && !line.horizontal) {
    svg.appendChild(el('line', { x1: sx(x1), y1: sy(y1), x2: sx(x2), y2: sy(y1), class: 'run-seg', id: 'runSeg' }));
    svg.appendChild(el('line', { x1: sx(x2), y1: sy(y1), x2: sx(x2), y2: sy(y2), class: 'rise-seg', id: 'riseSeg' }));
    const rt = el('text', { x: (sx(x1) + sx(x2)) / 2, y: sy(y1) + (y2 > y1 ? 20 : -10), class: 'run-label', id: 'runLabel', 'text-anchor': 'middle' });
    rt.textContent = `run = ${x2 - x1}`;
    svg.appendChild(rt);
    const st = el('text', { x: sx(x2) + 8, y: (sy(y1) + sy(y2)) / 2, class: 'rise-label', id: 'riseLabel' });
    st.textContent = `rise = ${y2 - y1}`;
    svg.appendChild(st);
  }

  // equation badge near the line (hidden until Check step)
  const badge = el('text', { x: W - margin, y: margin + 6, class: 'eq-badge', id: 'eqBadge', 'text-anchor': 'end', 'font-weight': '700', 'font-size': '18', fill: '#24314B' });
  badge.textContent = line.eqStr;
  svg.appendChild(badge);

  // points
  for (const [px, py, label] of [[x1, y1, `(${x1}, ${y1})`], [x2, y2, `(${x2}, ${y2})`]]) {
    svg.appendChild(el('circle', { cx: sx(px), cy: sy(py), r: 7, fill: '#24314B' }));
    const t = el('text', { x: sx(px) + 10, y: sy(py) - 10, class: 'pt-label' });
    t.textContent = label;
    svg.appendChild(t);
  }

  return line;
}

let stepHTML = {};
let maxUnlocked = 1;
let activeStep = null;

function resetSteps() {
  document.getElementById('revealBox').innerHTML = '';
  document.querySelectorAll('.step-btn').forEach(b => b.classList.remove('enabled', 'active'));
  document.querySelector('.step1').classList.add('enabled');
  maxUnlocked = 1;
  activeStep = null;
  ['runSeg', 'riseSeg', 'runLabel', 'riseLabel', 'fullLine', 'eqBadge'].forEach(id => {
    const e = document.getElementById(id);
    if (e) e.classList.remove('shown');
  });
  document.getElementById('quizInput').value = '';
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('quizFeedback').className = 'quiz-feedback';
}

function plot() {
  const x1 = parseInt(document.getElementById('x1').value, 10);
  const y1 = parseInt(document.getElementById('y1').value, 10);
  const x2 = parseInt(document.getElementById('x2').value, 10);
  const y2 = parseInt(document.getElementById('y2').value, 10);
  if ([x1, y1, x2, y2].some(v => isNaN(v)) || (x1 === x2 && y1 === y2)) return;
  const line = renderGraph(x1, y1, x2, y2);
  current = { x1, y1, x2, y2, line };
  resetSteps();
  buildReveals();
}

function buildReveals() {
  const { x1, y1, x2, y2, line } = current;

  if (line.vertical) {
    stepHTML = {
      1: `<div class="genform">Rule: if x&#8321; = x&#8322;, the line is vertical</div>
          <div class="line">Both points have the same x-coordinate (x = ${x1}), so this line is <b>vertical</b>.</div>`,
      2: `<div class="genform">m = (y&#8322; &minus; y&#8321;) / (x&#8322; &minus; x&#8321;)</div>
          <div class="line">Dividing by (x&#8322; &minus; x&#8321;) = 0 is undefined, so this line has an <b>undefined slope</b>.</div>`,
      3: `<div class="genform">General Form: x = a</div>
          <div class="line">A vertical line can't be written as y = mx + b &mdash; it's written as x = a instead.</div>`,
      4: `<div class="genform">General Form: x = a</div>
          <div class="line">Final Answer: <b class="final">${line.eqStr}</b></div>`
    };
    return;
  }
  if (line.horizontal) {
    stepHTML = {
      1: `<div class="genform">Rule: if y&#8321; = y&#8322;, the line is horizontal</div>
          <div class="line">Both points have the same y-coordinate (y = ${y1}), so this line is <b>horizontal</b>.</div>`,
      2: `<div class="genform">m = (y&#8322; &minus; y&#8321;) / (x&#8322; &minus; x&#8321;)</div>
          <div class="line">slope m = (${y1} &minus; ${y1}) / (${x2} &minus; ${x1}) = 0</div>`,
      3: `<div class="genform">General Form: y = b</div>
          <div class="line">A horizontal line is simply y = ${y1}.</div>`,
      4: `<div class="genform">General Form: y = b</div>
          <div class="line">Final Answer: <b class="final">${line.eqStr}</b></div>`
    };
    return;
  }

  const run = x2 - x1, rise = y2 - y1;
  const mCoef = line.mCoef;
  const y1Paren = y1 < 0 ? `(${y1})` : `${y1}`;
  const x1Paren = x1 < 0 ? `(${x1})` : `${x1}`;
  const mx1 = fracMul(line.m, frac(x1, 1));
  const distributeRhs = fracNum(mx1) >= 0
    ? `${mCoef}x &minus; ${fracStr(mx1)}`
    : `${mCoef}x + ${fracStr(frac(-mx1.num, mx1.den))}`;

  stepHTML = {
    1: `<div class="genform">Run = x&#8322; &minus; x&#8321;&nbsp;&nbsp;&nbsp;&nbsp;Rise = y&#8322; &minus; y&#8321;</div>
        <div class="line">From (${x1}, ${y1}) to (${x2}, ${y2}):</div>
        <div class="line">Run = ${x2} &minus; ${x1} = <b>${run}</b> (move ${run >= 0 ? 'right' : 'left'} ${Math.abs(run)})</div>
        <div class="line">Rise = ${y2} &minus; ${y1} = <b>${rise}</b> (move ${rise >= 0 ? 'up' : 'down'} ${Math.abs(rise)})</div>`,
    2: `<div class="genform">m = (y&#8322; &minus; y&#8321;) / (x&#8322; &minus; x&#8321;)</div>
        <div class="line">slope m = rise &divide; run = ${rise} &divide; ${run} = <b>${fracStr(line.m)}</b></div>`,
    3: `<div class="genform">Point-Slope Form: y &minus; y&#8321; = m(x &minus; x&#8321;)</div>
        <div class="line">y &minus; ${y1Paren} = ${fracStr(line.m)}(x &minus; ${x1Paren})</div>
        <div class="line">y &minus; ${y1Paren} = ${distributeRhs}</div>
        <div class="genform spaced">Slope-Intercept Form: y = mx + b</div>
        <div class="line"><b>${line.eqStr}</b></div>`,
    4: `<div class="genform">General Form: y = mx + b</div>
        <div class="line">Final Answer: <b class="final">${line.eqStr}</b></div>`
  };
}

function showStep(step) {
  activeStep = step;
  document.getElementById('revealBox').innerHTML = stepHTML[step] || '';
  document.querySelectorAll('.step-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector('.step' + step);
  if (btn) btn.classList.add('active');
}

function unlockGraphOverlay(step) {
  if (step === 1) {
    ['runSeg', 'riseSeg', 'runLabel', 'riseLabel'].forEach(id => {
      const e = document.getElementById(id);
      if (e) e.classList.add('shown');
    });
  }
  if (step === 4) {
    const fl = document.getElementById('fullLine'); if (fl) fl.classList.add('shown');
    const eb = document.getElementById('eqBadge'); if (eb) eb.classList.add('shown');
  }
}

// ---------- step button wiring ----------
document.querySelectorAll('.step-btn[data-step]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!btn.classList.contains('enabled')) return;
    const step = parseInt(btn.dataset.step, 10);
    showStep(step);
    if (step === maxUnlocked) {
      unlockGraphOverlay(step);
      if (maxUnlocked < 4) {
        maxUnlocked++;
        const next = document.querySelector(`.step${maxUnlocked}`);
        if (next) next.classList.add('enabled');
      }
    }
  });
});

document.getElementById('plotBtn').addEventListener('click', plot);
document.getElementById('resetBtn').addEventListener('click', resetSteps);

document.getElementById('quizBtn').addEventListener('click', checkQuiz);
document.getElementById('quizInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') checkQuiz(); });

function checkQuiz() {
  const val = document.getElementById('quizInput').value;
  const fb = document.getElementById('quizFeedback');
  if (!val.trim()) return;
  const guess = normalizeEq(val);
  const correct = normalizeEq(current.line.eqStr);
  if (guess === correct) {
    fb.textContent = '✓ Correct! Great work.';
    fb.className = 'quiz-feedback correct';
  } else {
    fb.textContent = `Not quite — try again! (Hint: check your steps above)`;
    fb.className = 'quiz-feedback incorrect';
  }
}

// initial plot
plot();
</script>
</body>
</html>
